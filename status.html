<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Latihan | Semak Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/status.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg custom-navbar shadow-sm sticky-top">
        <div class="container-fluid px-3 px-md-4">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <i class="fa-solid fa-arrow-left me-2 text-primary"></i>
                <span class="fw-bold text-dark fs-5">Kembali</span>
            </a>
            <span class="badge bg-primary shadow-sm"><i class="fa-solid fa-magnifying-glass-chart me-1"></i> Semakan</span>
        </div>
    </nav>

    <div class="container mt-4 mb-5 pb-5">
        
        <h4 class="fw-bold mb-4 text-dark"><i class="fa-solid fa-clock-rotate-left me-2 text-primary"></i>Rekod Permohonan</h4>

        <div id="senaraiPermohonanContainer">
            <div class="text-center p-5">
                <i class="fa-solid fa-spinner fa-spin fa-3x text-primary opacity-50 mb-3"></i>
                <p class="text-muted">Memuatkan rekod permohonan anda...</p>
            </div>
        </div>

    </div>

    <footer class="text-center mt-auto mb-4 py-3 border-top">
        <p class="small text-muted mb-0 fw-bold">
            &copy; 2026 e-Latihan | Hospital Al-Sultan Abdullah (HASA) UiTM. Hak Cipta Terpelihara.
        </p>
    </footer>

    <div class="modal fade" id="modalBatal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px;">
                <div class="modal-header bg-danger text-white" style="border-radius: 16px 16px 0 0;">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-triangle-exclamation me-2"></i>Pengesahan Batal</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 text-center bg-light">
                    <i class="fa-solid fa-circle-xmark fa-4x text-danger mb-3 opacity-75"></i>
                    <h5 class="fw-bold text-dark mb-2" id="tajukBatal">Batal Permohonan?</h5>
                    <p class="text-muted small mb-3" id="teksBatal">Adakah anda pasti? Tindakan ini tidak boleh dipulihkan.</p>
                    
                    <div class="text-start bg-white p-3 rounded-3 border">
                        <label class="small fw-bold text-dark mb-2">Sebab Pembatalan (Wajib):</label>
                        <textarea id="sebabBatalText" class="form-control form-control-sm" rows="3" placeholder="Sila nyatakan sebab ringkas (Cth: Kecemasan, Bertindih jadual...)" required></textarea>
                    </div>

                    <input type="hidden" id="hideAppIdBatal">
                    <input type="hidden" id="hideJenisBatal">
                </div>
                <div class="modal-footer bg-white d-flex justify-content-center border-top-0" style="border-radius: 0 0 16px 16px;">
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Kembali</button>
                    <button type="button" class="btn btn-danger rounded-pill px-4 shadow-sm fw-bold" onclick="prosesBatalSebenar()">Ya, Batal Sekarang</button>
                </div>
            </div>
        </div>
    </div>

    <div id="customLoader" class="custom-loader-overlay d-none">
        <div class="loader-content text-center">
            <div class="custom-spinner"></div>
            <h5 id="loaderText" class="mt-3 fw-bold text-white" style="letter-spacing: 2px;">Memproses...</h5>
        </div>
    </div>
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-4" style="z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script src="js/notifikasi.js"></script>
    <script src="js/muatnaikfile.js"></script>
    
    <script src="js/status.js"></script>
</body>
</html>

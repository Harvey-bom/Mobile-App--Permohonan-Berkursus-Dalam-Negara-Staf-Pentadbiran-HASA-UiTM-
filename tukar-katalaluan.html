<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Latihan | Tetapan Semula Kata Laluan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div id="particles-js"></div>

    <div class="admin-login-container shadow-lg my-auto mx-auto">
        <div class="row g-0 h-100">
            
            <div class="col-md-5 left-intro-section d-flex flex-column justify-content-center align-items-center text-center p-5 text-white">
                <div class="logo-circle-large mb-4 shadow">
                    <i class="fa-solid fa-key fs-1"></i> </div>
                <h2 class="fw-bold mb-2">Keselamatan Akaun</h2>
                <p class="lead mb-4">Tetapan Semula Kata Laluan</p>
                <p class="small text-white-50">Sila cipta kata laluan baharu yang kukuh untuk melindungi akaun e-Latihan anda.</p>
            </div>

            <div class="col-md-7 right-form-section p-4 p-md-5 bg-white-glass d-flex flex-column justify-content-center">
                
                <h4 class="fw-bold text-dark mb-4">Cipta Kata Laluan Baru</h4>
                <p class="text-muted small mb-4">Masukkan kata laluan baharu anda di bawah.</p>

                <form id="resetPasswordForm">
                    <div class="mb-3 input-group-custom">
                        <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="newPassword" placeholder="Kata Laluan Baru" required>
                        <span class="password-toggle-icon" onclick="togglePassword('newPassword', 'newEyeIcon')">
                            <i class="fa-regular fa-eye" id="newEyeIcon"></i>
                        </span>
                    </div>

                    <div class="mb-4 input-group-custom">
                        <span class="input-icon"><i class="fa-solid fa-shield-check"></i></span>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Sahkan Kata Laluan Baru" required>
                        <span class="password-toggle-icon" onclick="togglePassword('confirmPassword', 'confirmEyeIcon')">
                            <i class="fa-regular fa-eye" id="confirmEyeIcon"></i>
                        </span>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 mb-3 shadow">Simpan & Log Masuk</button>
                    
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-decoration-none small forgot-link"><i class="fa-solid fa-arrow-left me-1"></i> Kembali ke Log Masuk</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/reset.js"></script>
</body>
</html>

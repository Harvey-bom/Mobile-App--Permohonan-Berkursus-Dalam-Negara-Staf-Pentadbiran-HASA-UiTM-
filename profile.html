<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Latihan | Kemas Kini Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg custom-navbar shadow-sm sticky-top">
        <div class="container-fluid px-3 px-md-4">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <i class="fa-solid fa-arrow-left me-2 text-success"></i>
                <span class="fw-bold text-dark fs-5">Kembali ke Papan Pemuka</span>
            </a>
        </div>
    </nav>

    <div class="container mt-4 mb-5 pb-5 d-flex justify-content-center">
        
        <div class="profile-card shadow-lg w-100" style="max-width: 600px;">
            
            <div class="profile-header text-center p-4">
                <div class="avatar-upload-container mx-auto mb-3 shadow position-relative">
                    
                    <div class="big-avatar-circle" id="bigAvatarLetter">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                    </div>

                    <img src="" alt="Foto Profil" id="bigAvatarImage" class="profile-image-fit d-none">
                    
                    <div class="camera-overlay" onclick="triggerFileInput()">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                </div>

                <input type="file" id="fileInputPFP" accept="image/png, image/jpeg, image/jpg" class="d-none" onchange="previewImage(event)">

                <h4 class="fw-bold text-dark mb-0" id="profileNameTitle">Memuatkan...</h4>
                <p class="text-muted small">Profil Staf e-Latihan</p>
            </div>

            <div class="p-4 p-md-5 bg-white">
                <form id="profileForm">
                    <h6 class="fw-bold text-success mb-3 border-bottom pb-2">Maklumat Peribadi</h6>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Nama Penuh</label>
                        <div class="input-group-custom">
                            <span class="input-icon"><i class="fa-regular fa-user"></i></span>
                            <input type="text" class="form-control" id="editNama" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">No. Pekerja / Staf ID</label>
                        <div class="input-group-custom">
                            <span class="input-icon"><i class="fa-solid fa-id-badge"></i></span>
                            <input type="text" class="form-control" id="editStaffId" required>
                        </div>
                    </div>

                    <h6 class="fw-bold text-success mb-3 border-bottom pb-2 mt-4">Keselamatan Akaun</h6>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">E-mel Rasmi (ID Log Masuk)</label>
                        <div class="input-group-custom">
                            <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" class="form-control bg-light" id="editEmail" disabled> 
                        </div>
                        <div class="form-text" style="font-size: 0.7rem;">E-mel tidak boleh ditukar bagi tujuan pengesahan identiti.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Tukar Kata Laluan Baru <span class="text-danger fw-normal">(Pilihan)</span></label>
                        <div class="input-group-custom">
                            <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control" id="editPassword" placeholder="Biarkan kosong jika tidak mahu tukar">
                            <span class="password-toggle-icon" onclick="togglePassword('editPassword', 'editEyeIcon')">
                                <i class="fa-regular fa-eye" id="editEyeIcon"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 shadow-sm mt-3">
                        <i class="fa-solid fa-floppy-disk me-1"></i> Simpan Perubahan
                    </button>
                </form>
            </div>
        </div>

    </div>

    <div id="customLoader" class="custom-loader-overlay d-none">
        <div class="loader-content text-center">
            <div class="custom-spinner"></div>
            <h5 id="loaderText" class="mt-3 fw-bold text-white tracking-widest">Menyimpan...</h5>
        </div>
    </div>

    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-4" style="z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script src="js/profile.js"></script>
</body>
</html>
